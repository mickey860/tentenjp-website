    <div class="content">
  <div class="form-card">
    <form id="contactForm" action="https://formspree.io/f/xaqperpq" method="POST" novalidate>
      
      <div class="form-group">
        <label>お名前</label>
        <input type="text" name="name" id="name" placeholder="お名前を入力してください">
        <div class="error-message" id="nameError"></div>
      </div>

      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" name="email" id="email" placeholder="メールアドレスを入力してください">
        <div class="error-message" id="emailError"></div>
      </div>

      <div class="form-group">
        <label>メッセージ内容</label>
        <textarea name="message" id="message" placeholder="メッセージを入力してください"></textarea>
        <div class="error-message" id="messageError"></div>
      </div>

      <input type="text" name="_gotcha" style="display:none">

      <button class="btn" type="submit">メッセージを送る</button>
    </form>
  </div>
</div>

          <a href="contact.html">お問い合わせ</a>
        </div>
      </div>
    </footer>
<script>
const form = document.getElementById("contactForm");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  let isValid = true;

  // 取得
  const name = document.getElementById("name");
  const email = document.getElementById("email");
  const message = document.getElementById("message");

  // エラー表示エリア
  const nameError = document.getElementById("nameError");
  const emailError = document.getElementById("emailError");
  const messageError = document.getElementById("messageError");

  // リセット
  [name, email, message].forEach(el => el.classList.remove("error"));
  [nameError, emailError, messageError].forEach(el => el.textContent = "");

  // 名前チェック
  if (name.value.trim() === "") {
    name.classList.add("error");
    nameError.textContent = "お名前を入力してください";
    isValid = false;
  }

  // メールチェック
  const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,}$/i;
  if (email.value.trim() === "") {
    email.classList.add("error");
    emailError.textContent = "メールアドレスを入力してください";
    isValid = false;
  } else if (!emailPattern.test(email.value)) {
    email.classList.add("error");
    emailError.textContent = "正しいメールアドレス形式で入力してください";
    isValid = false;
  }

  // メッセージチェック
  if (message.value.trim() === "") {
    message.classList.add("error");
    messageError.textContent = "メッセージを入力してください";
    isValid = false;
  }

  // OKなら送信
  if (isValid) {
    form.submit();
  }
});
</script>
